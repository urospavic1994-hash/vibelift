<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VibeLift</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:    #ff1f7d;
      --pink2:   #d4005e;
      --navy:    #0f2557;
      --navy2:   #1a3a7a;
      --navy3:   #091b40;
      --success: #0daa74;
      --pink-glow: rgba(255,31,125,.30);

      /* Semantic — light defaults */
      --bg:     #edf1fd;
      --card:   #ffffff;
      --sfx:    #f0f4fe;
      --border: #d8e2f6;
      --text:   #0f2557;
      --text2:  #6674a8;
      --hdr-bg: rgba(255,255,255,.88);
      --bar-bg: rgba(255,255,255,.92);
      --sh1: 0 1px 4px rgba(15,37,87,.05), 0 3px 10px rgba(15,37,87,.06);
      --sh2: 0 2px 8px rgba(15,37,87,.05), 0 8px 26px rgba(15,37,87,.09);
      --sh3: 0 4px 16px rgba(15,37,87,.08), 0 20px 48px rgba(15,37,87,.12);

      --r:   18px;
      --r-sm: 12px;
      --fd: 'Barlow Condensed', sans-serif;
      --fb: 'DM Sans', sans-serif;
    }

    [data-theme="dark"] {
      --bg:     #070c17;
      --card:   #0d1526;
      --sfx:    #060a13;
      --border: #162038;
      --text:   #dde5ff;
      --text2:  #6a7aa8;
      --hdr-bg: rgba(7,12,23,.9);
      --bar-bg: rgba(7,12,23,.94);
      --sh1: 0 1px 4px rgba(0,0,0,.25), 0 3px 10px rgba(0,0,0,.3);
      --sh2: 0 2px 8px rgba(0,0,0,.3), 0 8px 26px rgba(0,0,0,.38);
      --sh3: 0 4px 16px rgba(0,0,0,.35), 0 20px 48px rgba(0,0,0,.44);
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      transition: background .25s, color .25s;
    }

    body::before {
      content: '';
      position: fixed; top: -60px; right: -60px;
      width: 320px; height: 320px; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,31,125,.08) 0%, transparent 68%);
      pointer-events: none; z-index: 0;
    }

    #root { min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }

    .screen {
      min-height: 100vh; display: flex; flex-direction: column;
      animation: slideUp .26s cubic-bezier(.18,.82,.4,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Glass header ── */
    .hdr {
      padding: 13px 18px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--hdr-bg);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-title { font-family: var(--fd); font-size: 21px; font-weight: 800; color: var(--text); letter-spacing: .6px; }

    .back-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: none; background: rgba(127,127,127,.1); color: var(--text);
      font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .14s, transform .1s;
    }
    .back-btn:active { background: rgba(127,127,127,.2); transform: scale(.92); }

    /* ── Theme toggle ── */
    .theme-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--text2); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--sh1); transition: transform .1s;
    }
    .theme-btn:active { transform: scale(.9); }

    /* ── Buttons ── */
    .btn-pink {
      width: 100%; padding: 16px; border-radius: var(--r-sm);
      border: none;
      background: linear-gradient(135deg, var(--pink) 0%, var(--pink2) 100%);
      color: white; font-family: var(--fd);
      font-size: 18px; font-weight: 800; letter-spacing: .8px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,31,125,.38), 0 1px 4px rgba(212,0,94,.25);
      transition: transform .12s, box-shadow .12s;
    }
    .btn-pink:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(255,31,125,.28); }
    .btn-pink:disabled { opacity: .38; }

    .btn-outline {
      width: 100%; padding: 14px; border-radius: var(--r-sm);
      border: 2px solid var(--border); background: transparent;
      color: var(--text); font-family: var(--fd);
      font-size: 17px; font-weight: 700; letter-spacing: .4px;
      cursor: pointer; transition: background .14s;
    }
    .btn-outline:active { background: rgba(127,127,127,.08); }

    /* ── Card ── */
    .card { background: var(--card); border-radius: var(--r); padding: 18px; box-shadow: var(--sh2); }
    .sec-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.6px; color: var(--text2); margin-bottom: 14px;
    }

    /* ══════════════════════════════════
       HOME SCREEN
    ══════════════════════════════════ */
    .home-hero {
      height: 100vh; flex-shrink: 0;
      position: relative;
      background: url('./Main%20page%20hero%20image.png') center/cover no-repeat #0a1020;
      display: flex; flex-direction: column;
    }
    .home-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.58) 0%, rgba(0,0,0,.08) 38%, rgba(0,0,0,.72) 100%);
    }
    .hero-stats-row {
      display: flex; gap: 10px;
    }
    .hero-stat-chip {
      flex: 1;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 12px 14px;
    }
    .hero-stat-val { font-family: var(--fd); font-size: 34px; font-weight: 900; color: white; line-height: 1; }
    .hero-stat-val.amber { color: #f59e0b; }
    .hero-stat-lbl { font-size: 11px; color: rgba(255,255,255,.58); margin-top: 3px; font-weight: 500; }
    .home-hero-top {
      position: relative; z-index: 1;
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 18px 0;
    }
    .home-hero-greeting {
      font-family: var(--fd); font-size: 38px; font-weight: 900;
      color: white; line-height: 1; letter-spacing: .4px;
    }
    .home-hero-date { font-size: 13px; color: rgba(255,255,255,.62); margin-top: 5px; font-weight: 500; }
    .home-hero-bottom {
      position: relative; z-index: 1;
      margin-top: auto; padding: 0 18px 26px;
    }
    .home-hero-eyebrow {
      font-family: var(--fd); font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 2.2px;
      color: rgba(255,255,255,.52); margin-bottom: 7px;
    }
    .home-hero-title {
      font-family: var(--fd); font-size: 42px; font-weight: 900;
      color: white; line-height: 1; letter-spacing: .3px; margin-bottom: 6px;
    }
    .home-hero-sub {
      font-size: 14px; color: rgba(255,255,255,.62); margin-bottom: 22px; font-weight: 500;
    }
    .home-hero-btn {
      padding: 15px 32px; border-radius: var(--r-sm); border: none;
      background: #f59e0b; color: #0f2557;
      font-family: var(--fd); font-size: 18px; font-weight: 900; letter-spacing: .8px;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(245,158,11,.45);
      transition: transform .12s, box-shadow .12s;
    }
    .home-hero-btn:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(245,158,11,.3); }
    .home-scroll-body {
      flex: 1; overflow-y: auto;
      padding: 18px 18px 60px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { background: var(--card); border-radius: var(--r); padding: 18px 16px; box-shadow: var(--sh2); }
    .stat-val        { font-family: var(--fd); font-size: 44px; font-weight: 900; color: var(--text); line-height: 1; }
    .stat-val.amber  { color: #f59e0b; }
    .stat-lbl        { font-size: 12px; color: var(--text2); margin-top: 4px; font-weight: 500; }

    /* calendar */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day-lbl { text-align: center; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); padding-bottom: 6px; }
    .cal-day {
      aspect-ratio: 1; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--text2);
      cursor: default; transition: background .15s;
    }
    .cal-day.has-workout { background: rgba(255,31,125,.15); color: var(--pink); cursor: pointer; font-weight: 700; }
    .cal-day.has-workout:active { background: rgba(255,31,125,.25); }
    .cal-day.in-progress { background: rgba(245,158,11,.18); color: #f59e0b; cursor: pointer; font-weight: 700; }
    .cal-day.today-ring { box-shadow: 0 0 0 2px var(--text); }
    .cal-day.future { opacity: .3; }
    .cal-day.selected { background: var(--pink) !important; color: white !important; box-shadow: 0 2px 10px rgba(255,31,125,.35); }
    .cal-day.in-progress.selected { background: #f59e0b !important; color: #0f2557 !important; }
    .cal-expand {
      grid-column: 1 / -1;
      background: var(--sfx); border-radius: 12px;
      padding: 12px 14px; margin-top: 2px;
      border-left: 3px solid var(--pink);
      animation: slideDown .2s ease;
    }
    .cal-expand.active-expand { border-left-color: #f59e0b; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
    .cal-expand-date { font-family: var(--fd); font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 8px; letter-spacing: .3px; }
    .cal-expand-ex { font-size: 12px; color: var(--text2); padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .cal-expand-ex:last-child { border-bottom: none; }
    .cal-expand-ex-name { font-weight: 600; color: var(--text); }
    .cal-in-progress-badge { font-size: 10px; font-weight: 700; color: #f59e0b; background: rgba(245,158,11,.14); padding: 2px 8px; border-radius: 20px; }

    /* break modal & exercise-done sheet */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-sheet {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 20px 22px env(safe-area-inset-bottom, 28px);
      animation: slideUp .28s cubic-bezier(.18,.82,.4,1);
    }
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 20px; }
    .modal-title { font-family: var(--fd); font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: .4px; margin-bottom: 6px; }
    .modal-sub { font-size: 14px; color: var(--text2); margin-bottom: 22px; line-height: 1.5; }
    .ex-done-btn {
      width: 100%; padding: 16px 18px; border-radius: var(--r-sm); border: 2px solid var(--border);
      background: var(--card); color: var(--text);
      font-family: var(--fd); font-size: 17px; font-weight: 800; letter-spacing: .4px;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 12px;
      box-shadow: var(--sh1); transition: border-color .14s, background .14s; margin-bottom: 10px;
    }
    .ex-done-btn:active { background: var(--sfx); border-color: var(--pink); }
    .ex-done-btn-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
    .ex-done-finish {
      width: 100%; padding: 11px; border-radius: var(--r-sm); border: none; margin-top: 2px;
      background: transparent; color: var(--text2);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: color .14s;
    }
    .ex-done-finish:active { color: var(--pink); }

    /* Home history preview */
    .hist-preview-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .hist-preview-row:last-child { border-bottom: none; }
    .hist-preview-date { font-size: 13.5px; font-weight: 600; color: var(--text); }
    .hist-preview-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .hist-preview-icons { display: flex; gap: 4px; align-items: center; }
    .view-all-btn {
      display: block; width: 100%; margin-top: 12px; padding: 10px;
      border-radius: var(--r-sm); border: 1.5px solid var(--border); background: transparent;
      color: var(--text2); font-family: var(--fd); font-size: 14px; font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase; cursor: pointer;
      transition: background .14s;
    }
    .view-all-btn:active { background: rgba(127,127,127,.07); }

    /* ══════════════════════════════════
       HISTORY SCREEN
    ══════════════════════════════════ */
    .hist-body { flex: 1; overflow-y: auto; padding: 20px 18px 60px; display: flex; flex-direction: column; gap: 14px; }

    .hist-workout-card { background: var(--card); border-radius: var(--r); overflow: hidden; box-shadow: var(--sh2); }
    .hist-workout-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
    }
    .hist-workout-date { font-family: var(--fd); font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: .3px; }
    .hist-workout-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .hist-workout-vol {
      font-family: var(--fd); font-size: 16px; font-weight: 800; color: var(--pink);
      background: rgba(255,31,125,.1); padding: 4px 10px; border-radius: 20px;
    }
    .hist-ex-list { padding: 4px 0; }
    .hist-ex-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
    }
    .hist-ex-row:last-child { border-bottom: none; }
    .hist-ex-info { flex: 1; }
    .hist-ex-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .hist-ex-sets { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
    .hist-set-pill {
      font-size: 11px; font-weight: 600; color: var(--text2);
      background: var(--sfx); padding: 3px 8px; border-radius: 20px;
    }
    .hist-empty { text-align: center; padding: 60px 24px; color: var(--text2); }
    .hist-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .hist-empty-txt { font-size: 15px; line-height: 1.6; }

    /* ══════════════════════════════════
       GROUP SELECT SCREEN
    ══════════════════════════════════ */
    .group-select-body { flex: 1; overflow-y: auto; padding: 16px 18px 100px; display: flex; flex-direction: column; gap: 12px; }

    .grp-card {
      position: relative; border-radius: 20px; overflow: hidden; height: 148px;
      cursor: pointer; box-shadow: var(--sh2);
      transition: transform .14s cubic-bezier(.2,.8,.4,1);
    }
    .grp-card:active { transform: scale(.97); }

    .grp-card-bg-icon {
      position: absolute; right: -12px; bottom: -12px; opacity: .14;
      transform: rotate(-10deg);
    }
    .grp-card-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 14px 18px 18px;
      background: linear-gradient(to top, rgba(0,0,0,.72) 0%, rgba(0,0,0,.1) 100%);
    }
    .grp-card-name { font-family: var(--fd); font-size: 30px; font-weight: 900; color: white; letter-spacing: .4px; line-height: 1; }
    .grp-card-count { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 3px; font-weight: 500; }
    .grp-done-pill {
      position: absolute; top: 12px; right: 12px;
      background: var(--success); color: white;
      font-family: var(--fd); font-size: 12px; font-weight: 800; letter-spacing: .5px;
      padding: 4px 10px; border-radius: 20px;
    }

    .finish-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      padding: 14px 18px env(safe-area-inset-bottom, 22px);
      background: var(--bar-bg);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      border-top: 1px solid var(--border); z-index: 200;
    }
    .done-count-badge {
      font-family: var(--fd); font-size: 13px; font-weight: 800; color: var(--pink);
      background: rgba(255,31,125,.1); padding: 4px 12px; border-radius: 20px; letter-spacing: .4px;
    }

    /* ══════════════════════════════════
       GROUP DETAIL (exercise list)
    ══════════════════════════════════ */
    .group-detail-body { flex: 1; overflow-y: auto; padding: 16px 18px 100px; display: flex; flex-direction: column; gap: 8px; }

    .grp-detail-hero {
      border-radius: 16px; overflow: hidden; height: 100px; position: relative; margin-bottom: 8px;
    }
    .grp-detail-hero-inner {
      height: 100%; display: flex; align-items: center; padding: 0 20px; gap: 16px; position: relative;
    }
    .grp-detail-hero-name {
      font-family: var(--fd); font-size: 42px; font-weight: 900; color: white; letter-spacing: .5px;
    }
    .grp-detail-hero-sub { font-size: 13px; color: rgba(255,255,255,.65); margin-top: 2px; }

    .ex-row-card {
      background: var(--card); border-radius: 14px; padding: 14px 16px;
      box-shadow: var(--sh1); cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      border: 2px solid transparent;
      transition: border-color .15s, transform .12s;
    }
    .ex-row-card:active { transform: scale(.97); }
    .ex-row-card.done-row { border-color: var(--success); background: rgba(13,170,116,.05); }
    .ex-row-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--sfx); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ex-row-info { flex: 1; }
    .ex-row-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .ex-row-pb   { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .ex-row-check { width: 24px; height: 24px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: 800; flex-shrink: 0; }

    /* ══════════════════════════════════
       LOG SCREEN — Tinder hero style
    ══════════════════════════════════ */
    .log-hero {
      position: relative; overflow: hidden;
      min-height: 210px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .log-hero-bg-icon {
      position: absolute; right: -20px; top: -10px; opacity: .1;
      transform: rotate(12deg);
    }
    .log-hero-content {
      position: relative; z-index: 1; padding: 22px 22px 20px;
      background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.05) 100%);
    }
    .log-hero-eyebrow {
      font-family: var(--fd); font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: rgba(255,255,255,.55); margin-bottom: 4px;
    }
    .log-hero-name {
      font-family: var(--fd); font-size: 56px; font-weight: 900;
      color: white; line-height: .95; letter-spacing: .5px; text-transform: uppercase;
    }
    .log-hero-pb {
      font-size: 13px; color: rgba(255,255,255,.65); margin-top: 7px; font-weight: 500;
    }
    .log-hero-back {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,.35); border: none; color: white;
      font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); transition: background .14s;
    }
    .log-hero-back:active { background: rgba(0,0,0,.55); }
    .pr-glow { color: #ffd700; font-size: 13px; font-weight: 700; }

    .log-body {
      flex: 1; overflow-y: auto; padding: 16px 18px 144px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .set-prog { background: var(--card); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--sh2); }
    .set-dots { display: flex; align-items: flex-start; gap: 0; justify-content: center; }
    .set-dot-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; max-width: 64px; }

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
const todayISO = () => new Date().toISOString().split('T')[0];

function fmtDate(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function fmtDateShort(iso) {
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem('fittrack_v1') || '[]'); } catch { return []; }
}
function saveHistory(h) { localStorage.setItem('fittrack_v1', JSON.stringify(h)); }
function loadCurrent() {
  try { const s = localStorage.getItem('fittrack_current'); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveCurrent(w) {
  if (w) localStorage.setItem('fittrack_current', JSON.stringify(w));
  else localStorage.removeItem('fittrack_current');
}
function loadTheme() { return localStorage.getItem('fittrack_theme') || 'light'; }
function saveTheme(t) { localStorage.setItem('fittrack_theme', t); }

function loadProfile() {
  try { return JSON.parse(localStorage.getItem('fittrack_profile') || 'null'); } catch { return null; }
}
function saveProfile(p) { localStorage.setItem('fittrack_profile', JSON.stringify(p)); }

function loadCustomEx() {
  try { return JSON.parse(localStorage.getItem('fittrack_custom_ex') || '[]'); } catch { return []; }
}
function saveCustomEx(ex) { localStorage.setItem('fittrack_custom_ex', JSON.stringify(ex)); }

function getStreak(history) {
  if (!history.length) return 0;
  const dates = [...new Set(history.map(w => w.date))].sort().reverse();
  const today = todayISO();
  let streak = 0, check = today;
  for (const d of dates) {
    if (d === check) {
      streak++;
      const dt = new Date(check + 'T12:00:00'); dt.setDate(dt.getDate() - 1);
      check = dt.toISOString().split('T')[0];
    } else if (d < check) break;
  }
  return streak;
}

function get28Days() {
  const today = new Date(); const dow = today.getDay();
  const start = new Date(today); start.setDate(today.getDate() - dow - 21);
  const arr = [];
  for (let i = 0; i < 28; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    arr.push(d.toISOString().split('T')[0]);
  }
  return arr;
}

function getPersonalBest(history, exId) {
  let best = 0;
  for (const w of history) for (const e of w.exercises) if (e.id === exId) for (const s of e.sets) if (s.weight > best) best = s.weight;
  return best;
}

function getTrend(history, exId) {
  const rel = history.filter(w => w.exercises.some(e => e.id === exId));
  if (rel.length < 2) return null;
  const last2 = rel.slice(-2);
  const maxW = w => Math.max(...w.exercises.find(e => e.id === exId).sets.map(s => s.weight));
  const diff = maxW(last2[1]) - maxW(last2[0]);
  return diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
}

/* ═══════════════════════════════════════
   WORKOUT CALENDAR
═══════════════════════════════════════ */
function getCalendarMonth() {
  const today = new Date();
  const year = today.getFullYear(), month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({ day: d, iso });
  }
  return { cells, monthLabel: today.toLocaleDateString('en-US', { month:'long', year:'numeric' }) };
}

function WorkoutCalendar({ history, current }) {
  const [expanded, setExpanded] = useState(null);
  const { cells, monthLabel } = useMemo(getCalendarMonth, []);
  const today = todayISO();
  const doneDates = useMemo(() => new Set(history.map(w => w.date)), [history]);
  const inProgressDate = current && current.exercises.length > 0 ? current.date : null;

  function handleDayTap(iso) {
    if (doneDates.has(iso) || iso === inProgressDate) {
      setExpanded(prev => prev === iso ? null : iso);
    }
  }

  const expandedWorkout = expanded ? history.find(w => w.date === expanded) : null;
  const expandedIsActive = expanded === inProgressDate;

  return (
    <div>
      <div style={{ marginBottom: 10 }}>
        <span className="sec-label" style={{ marginBottom: 0 }}>Activity — {monthLabel}</span>
      </div>
      <div className="cal-grid">
        {DAYS_SHORT.map(d => <div key={d} className="cal-day-lbl">{d}</div>)}
        {cells.map((cell, i) => {
          if (!cell) return <div key={`e${i}`} className="cal-day empty" />;
          const { day, iso } = cell;
          const isDone = doneDates.has(iso);
          const isActive = iso === inProgressDate;
          const isFuture = iso > today;
          const isToday = iso === today;
          const isSelected = expanded === iso;
          let cls = 'cal-day';
          if (isFuture) cls += ' future';
          else if (isActive) cls += ' in-progress';
          else if (isDone) cls += ' has-workout';
          if (isToday) cls += ' today-ring';
          if (isSelected) cls += ' selected';
          return <div key={iso} className={cls} onClick={() => handleDayTap(iso)}>{day}</div>;
        })}
      </div>
      {expanded && (
        <div className={`cal-expand ${expandedIsActive ? 'active-expand' : ''}`} style={{ marginTop: 10 }}>
          <div className="cal-expand-date">{fmtDate(expanded)}</div>
          {expandedIsActive && !expandedWorkout ? (
            <>
              <div className="cal-expand-ex">
                <span className="cal-expand-ex-name">Workout in progress</span>
                <span className="cal-in-progress-badge">Active</span>
              </div>
              {current.exercises.map((ex, j) => (
                <div key={j} className="cal-expand-ex">
                  <span className="cal-expand-ex-name">{ex.name}</span>
                  <span>{ex.sets.length} sets</span>
                </div>
              ))}
            </>
          ) : expandedWorkout ? (
            expandedWorkout.exercises.map((ex, j) => (
              <div key={j} className="cal-expand-ex">
                <span className="cal-expand-ex-name">{ex.name}</span>
                <span>{ex.sets.length} sets</span>
              </div>
            ))
          ) : null}
        </div>
      )}
    </div>
  );
}

function SplashScreen({ isFirstTime, onContinue }) {
  const [fading, setFading] = useState(false);

  useEffect(() => {
    if (!isFirstTime) {
      const t1 = setTimeout(() => setFading(true), 1100);
      const t2 = setTimeout(onContinue, 1500);
      return () => { clearTimeout(t1); clearTimeout(t2); };
    }
  }, []);

  function handleBtn() {
    setFading(true);
    setTimeout(onContinue, 400);
  }

  return (
    <div className={`splash ${fading ? 'fading' : ''}`}>
      <div className="splash-overlay" />
      <div className="splash-content">
        <div className="splash-text-wrap">
          <div className="splash-logo">Vibe<span>Lift</span></div>
          <div className="splash-tagline">Work out, not stress out.</div>
        </div>
        {isFirstTime && (

/* ═══════════════════════════════════════
   LOG SCREEN — Tinder / hotel-card hero
═══════════════════════════════════════ */
function LogScreen({ exercise, onBack, onComplete, history }) {
  const [totalSets, setTotalSets] = useState(3);
  const [warmup, setWarmup] = useState('pending'); // 'pending' | 'done' | 'skipped'
  const [currentSet, setCurrentSet] = useState(1);
  const [doneSets, setDoneSets] = useState([]);
  const [weight, setWeight] = useState('');
  const [reps, setReps] = useState('');
  const [allDone, setAllDone] = useState(false);

  const pb    = useMemo(() => getPersonalBest(history, exercise.id), [history, exercise.id]);
  const trend = useMemo(() => getTrend(history, exercise.id), [history, exercise.id]);
  const meta  = GROUP_META[exercise.group] || GROUP_META.chest;

  useEffect(() => {
    for (let i = history.length - 1; i >= 0; i--) {
      const ex = history[i].exercises.find(e => e.id === exercise.id);
      if (ex && ex.sets.length > 0) { setWeight(String(ex.sets[0].weight)); setReps(String(ex.sets[0].reps)); break; }
    }
  }, []);

  const maxLogged = doneSets.length ? Math.max(...doneSets.map(s => s.weight)) : 0;
  const isNewPR   = maxLogged > pb && pb > 0;
  const inWarmup  = warmup === 'pending';

  function completeSet() {
    if (!weight || !reps) return;
    const s = { setNum: currentSet, weight: parseFloat(weight), reps: parseInt(reps) };
    const next = [...doneSets, s];
    setDoneSets(next);
    if (currentSet >= totalSets) setAllDone(true);
    else setCurrentSet(currentSet + 1);
  }

  function finish() { onComplete({ ...exercise, sets: doneSets }); }

  return (
    <div className="screen">
      <div className="log-hero" style={{ background: meta.grad }}>
        <button className="log-hero-back" onClick={onBack}>←</button>
        <div className="log-hero-bg-icon">
          <ExIcon id={exercise.id} size={160} color="white" />
        </div>
        <div className="log-hero-content">
          <div className="log-hero-eyebrow">{exercise.gl}</div>
          <div className="log-hero-name">{exercise.name}</div>
          <div className="log-hero-pb">
            {pb > 0 ? <>Personal best: <strong>{pb} kg</strong>{trend === 'up' && ' ↑'}{trend === 'down' && ' ↓'}</> : 'First time logging this'}
            {isNewPR && <span className="pr-glow"> 🏆 New PR!</span>}
          </div>
        </div>
      </div>

      <div className="log-body">
        {/* Set progress dots — Warmup dot + working set dots */}
        <div className="set-prog">
          <div className="sec-label">Set Progress</div>
          <div className="set-dots">
            <div className="set-dot-wrap">
              <div className={`set-dot ${warmup === 'done' ? 'completed' : ''} ${inWarmup ? 'active' : ''} ${warmup === 'skipped' ? 'warmup-skipped' : ''}`}>
                {warmup === 'done' ? '✓' : warmup === 'skipped' ? '—' : 'W'}
              </div>
              <div className="set-dot-lbl">Warm Up</div>
            </div>
            <div className={`set-dot-connector ${warmup !== 'pending' ? 'done-conn' : ''}`} />
            {Array.from({ length: totalSets }, (_, i) => {
              const n = i + 1;
              const completed = doneSets.some(s => s.setNum === n);
              const active    = !inWarmup && !allDone && n === currentSet;
              return (
                <React.Fragment key={n}>
                  <div className="set-dot-wrap">
                    <div className={`set-dot ${completed ? 'completed' : ''} ${active ? 'active' : ''}`}>
                      {completed ? '✓' : n}
                    </div>
                    <div className="set-dot-lbl">Set {n}</div>
                  </div>
                  {i < totalSets - 1 && <div className={`set-dot-connector ${completed ? 'done-conn' : ''}`} />}
                </React.Fragment>
              );
            })}
          </div>
        </div>

        {/* Warmup phase UI */}
        {inWarmup && (
          <div className="warmup-card">
            <div className="warmup-card-title">Warm-Up Set</div>
            <div className="warmup-card-desc">Do a light set to get the muscle primed before going heavy. No weight or reps logged.</div>
            <button className="btn-pink" onClick={() => setWarmup('done')}>✓ Warm-Up Done</button>
            <button className="btn-outline" onClick={() => setWarmup('skipped')}>Skip Warm-Up</button>
          </div>
        )}

        {/* Working set input */}
        {!inWarmup && !allDone && (
          <div className="input-form">
            <div className="input-form-title">Set {currentSet} of {totalSets}</div>
            <div className="input-row">
              <div className="inp-group">
                <label>Weight (kg)</label>
                <input type="number" value={weight} placeholder="0" min="0" step="2.5" onChange={e => setWeight(e.target.value)} />
              </div>
              <div className="inp-group">
                <label>Reps</label>
                <input type="number" value={reps} placeholder="0" min="0" step="1" onChange={e => setReps(e.target.value)} />
              </div>
            </div>
          </div>
        )}

        {doneSets.length > 0 && (
          <div className="prev-sets">
            <div className="sec-label">Completed Sets</div>
            {doneSets.map((s, i) => (
              <div key={i} className="prev-set-row">
                <span className="prev-set-lbl">Set {s.setNum}</span>
                <span className="prev-set-val">
                  {s.weight} kg × {s.reps} reps
                  {s.weight >= maxLogged && isNewPR && <span className="pr-badge">PR</span>}
                </span>
              </div>
            ))}
          </div>
        )}

        {allDone && (
          <div className="done-banner"><span>All {totalSets} sets complete</span></div>
        )}
      </div>

      <div className="log-action-bar">
        {/* Sets adjuster — visible during warmup or before first working set */}
        {(inWarmup || (!allDone && doneSets.length === 0)) && (
          <div className="sets-ctrl">
            <button className="sets-ctrl-btn" onClick={() => setTotalSets(Math.max(1, totalSets - 1))}>−</button>
            <span className="sets-ctrl-lbl">{totalSets} sets</span>
            <button className="sets-ctrl-btn" onClick={() => setTotalSets(Math.min(8, totalSets + 1))}>+</button>
          </div>
        )}
        {!inWarmup && (!allDone
          ? <button className="btn-pink" onClick={completeSet} disabled={!weight || !reps}>Complete Set {currentSet} →</button>
          : <button className="btn-pink" onClick={finish}>✓ Mark Exercise Complete</button>)}
        {!inWarmup && !allDone && doneSets.length > 0 && (
          <button className="btn-outline" onClick={finish}>Stop Early &amp; Save</button>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   SUMMARY SCREEN
═══════════════════════════════════════ */
function SummaryScreen({ workout, baseHistory, onDone }) {
  const totalSets = workout.exercises.reduce((s,e)=>s+e.sets.length,0);
  const totalVol  = workout.exercises.reduce((s,e)=>e.sets.reduce((a,t)=>a+t.weight*t.reps,s),0);
  return (
    <div className="screen">
      <div className="sum-hero">
        <div className="sum-title">Workout Complete</div>
        <div className="sum-date">{fmtDate(workout.date)}</div>
        <div className="sum-stats">
          <div className="sum-stat"><div className="sum-stat-v">{workout.exercises.length}</div><div className="sum-stat-l">Exercises</div></div>
          <div className="sum-stat"><div className="sum-stat-v">{totalSets}</div><div className="sum-stat-l">Sets</div></div>
          <div className="sum-stat"><div className="sum-stat-v">{totalVol >= 1000 ? (totalVol/1000).toFixed(1)+'t' : totalVol+'kg'}</div><div className="sum-stat-l">Volume</div></div>
        </div>
      </div>
      <div className="sum-body">
        <div className="sec-label">Exercise Breakdown</div>
        {workout.exercises.map((ex, i) => {
          const prevBest = getPersonalBest(baseHistory, ex.id);
          const maxW     = ex.sets.length ? Math.max(...ex.sets.map(s => s.weight)) : 0;
          const isNewPR  = maxW > prevBest;
          const meta     = GROUP_META[ex.group] || GROUP_META.chest;
          return (
            <div key={i} className="sum-ex-card">
              <div className="sum-ex-hdr">
                <ExIcon id={ex.id} size={30} color={meta.color} />
                <div>
                  <div className="sum-ex-name">
                    {ex.name}
                    {isNewPR && <span className="pr-badge" style={{ marginLeft:8 }}>PR</span>}
                  </div>
                  <div className="sum-ex-group">{ex.gl}</div>
                </div>
              </div>
              <div>
                <div className="sum-tbl-hdr"><span>Set</span><span>Weight</span><span>Reps</span></div>
                {ex.sets.map((s, j) => (
                  <div key={j} className="sum-set-row">
                    <span className="sum-set-n">#{s.setNum}</span>
                    <span className="sum-set-w" style={{ color: s.weight === maxW && isNewPR ? 'var(--pink)' : 'var(--text)' }}>{s.weight} kg</span>
                    <span className="sum-set-r">{s.reps} reps</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div className="sum-action-bar">
        <button className="btn-pink" onClick={onDone}>Back to Home</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   BREAK MODAL
═══════════════════════════════════════ */
function BreakModal({ onBreak, onDone }) {
  return (
    <div className="modal-backdrop" onClick={onBreak}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-title">Taking a break?</div>
        <div className="modal-sub">Your progress is saved. Come back whenever you're ready and pick up exactly where you left off.</div>
        <button className="btn-pink" onClick={onDone} style={{ marginBottom:10 }}>Done — Save &amp; Finish</button>
        <button className="btn-outline" onClick={onBreak}>Just a Break — Resume Later</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   EXERCISE DONE SHEET
═══════════════════════════════════════ */
function ExerciseDoneSheet({ exerciseName, group, onSameGroup, onNewGroup, onFinish }) {
  const meta = GROUP_META[group] || GROUP_META.chest;
  return (
    <div className="modal-backdrop" onClick={onSameGroup}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-title">Nice work!</div>
        <div className="modal-sub" style={{ marginBottom:18 }}><strong>{exerciseName}</strong> is done. What's next?</div>
        <button className="ex-done-btn" onClick={onSameGroup}>
          <div className="ex-done-btn-icon" style={{ background: meta.grad }}>
            <ExIcon id={meta.icon} size={20} color="white" />
          </div>
          <div>
            <div>Add exercise — {group.charAt(0).toUpperCase()+group.slice(1)}</div>
            <div style={{ fontSize:12, fontWeight:500, color:'var(--text2)', marginTop:2 }}>Stay in the same muscle group</div>
          </div>
        </button>
        <button className="ex-done-btn" onClick={onNewGroup}>
          <div className="ex-done-btn-icon" style={{ background:'rgba(127,127,127,.12)' }}>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="var(--text)" strokeWidth="1.8" strokeLinecap="round">
              <rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/>
              <rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/>
            </svg>
          </div>
          <div>
            <div>New muscle group</div>
            <div style={{ fontSize:12, fontWeight:500, color:'var(--text2)', marginTop:2 }}>Switch to a different area</div>
          </div>
        </button>
        <button className="ex-done-finish" onClick={onFinish}>Finish workout</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP ROOT
═══════════════════════════════════════ */
function App() {
  const [history, setHistory]       = useState(() => loadHistory());
  const [current, setCurrent]       = useState(() => loadCurrent());
  const [activeGroup, setActiveGroup] = useState(null);
  const [activeEx, setActiveEx]     = useState(null);
  const [summary, setSummary]       = useState(null);
  const [theme, setTheme]           = useState(() => loadTheme());
  const [profile, setProfile]       = useState(() => loadProfile());
  const [customEx, setCustomEx]     = useState(() => loadCustomEx());
  const [splash, setSplash]         = useState(true);
  const [screen, setScreen]         = useState('home');
  const [breakModal, setBreakModal] = useState(false);
  const [exerciseDoneSheet, setExerciseDoneSheet] = useState(null);

  // Apply theme to body immediately
  useEffect(() => {
    document.body.setAttribute('data-theme', theme);
    saveTheme(theme);
  }, [theme]);

  useEffect(() => { saveCurrent(current); }, [current]);

  function toggleTheme() { setTheme(t => t === 'light' ? 'dark' : 'light'); }

  // Merge built-in + custom exercises — passed to group screens
  const allExercises = useMemo(() => [...DB, ...customEx], [customEx]);

  function onSplashDone() {
    setSplash(false);
    if (!profile || !profile.setupDone) { setScreen('profile-setup'); return; }
    if (current && current.exercises.length > 0) setBreakModal(true);
  }

  function onProfileSave(p) {
    saveProfile(p);
    setProfile(p);
    setScreen('home');
  }

  function onSaveProfile(p) { saveProfile(p); setProfile(p); }
  function onSaveCustomEx(ex) { saveCustomEx(ex); setCustomEx(ex); }

  function startWorkout() {
    if (!current) setCurrent({ date: todayISO(), exercises: [] });
    setScreen('group-select');
  }

  function selectGroup(grp) { setActiveGroup(grp); setScreen('group-detail'); }
  function pickExercise(ex) { setActiveEx(ex); setScreen('log'); }

  function completeExercise(ex) {
    setCurrent(prev => ({ ...prev, exercises: [...prev.exercises.filter(e => e.id !== ex.id), ex] }));
    setActiveEx(null);
    setScreen('group-detail');
    setExerciseDoneSheet({ exerciseName: ex.name, group: ex.group });
  }

  function finishWorkout() {
    if (!current || current.exercises.length === 0) return;
    const base = [...history];
    const next = [...history, current];
    setHistory(next); saveHistory(next);
    setSummary({ workout: current, baseHistory: base });
    setCurrent(null);
    setBreakModal(false);
    setExerciseDoneSheet(null);
    setScreen('summary');
  }

  function backFromLog() { setActiveEx(null); setScreen('group-detail'); }
  function backFromGroupDetail() { setScreen('group-select'); }
  function backFromGroupSelect() {
    const hasWork = current && current.exercises.length > 0;
    if (hasWork) { setBreakModal(true); return; }
    setScreen('home');
  }

  const isFirstTime = !profile || !profile.setupDone;
  const completedIds = ((current && current.exercises) ? current.exercises : []).map(e => e.id);

  // Always render splash on top when active
  return (
    <>
      {splash && <SplashScreen isFirstTime={isFirstTime} onContinue={onSplashDone} />}

      {!splash && screen === 'profile-setup' && (
        <ProfileSetupScreen onSave={onProfileSave} />
      )}

      {!splash && screen === 'home' && (
        <HomeScreen onStart={startWorkout} onViewHistory={() => setScreen('history')} onOpenSettings={() => setScreen('settings')} history={history} hasActive={!!current} profile={profile} current={current} />
      )}

      {breakModal && (
        <BreakModal
          onBreak={() => { setBreakModal(false); setScreen('home'); }}
          onDone={() => { finishWorkout(); }}
        />
      )}

      {exerciseDoneSheet && (
        <ExerciseDoneSheet
          exerciseName={exerciseDoneSheet.exerciseName}
          group={exerciseDoneSheet.group}
          onSameGroup={() => { setExerciseDoneSheet(null); setScreen('group-detail'); }}
          onNewGroup={() => { setExerciseDoneSheet(null); setScreen('group-select'); }}
          onFinish={() => { setExerciseDoneSheet(null); finishWorkout(); }}
        />
      )}

      {!splash && screen === 'history' && (
        <HistoryScreen onBack={() => setScreen('home')} history={history} />
      )}

      {!splash && screen === 'settings' && (
        <SettingsScreen onBack={() => setScreen('home')} profile={profile} onSaveProfile={onSaveProfile} theme={theme} onToggleTheme={toggleTheme} customEx={customEx} onSaveCustomEx={onSaveCustomEx} />
      )}

      {!splash && screen === 'group-select' && (
        <GroupSelectScreen onBack={backFromGroupSelect} onSelectGroup={selectGroup} onFinish={finishWorkout} completedIds={completedIds} allExercises={allExercises} />
      )}

      {!splash && screen === 'group-detail' && activeGroup && (
        <GroupDetailScreen group={activeGroup} onBack={backFromGroupDetail} onPick={pickExercise} onFinish={finishWorkout} completedIds={completedIds} history={history} allExercises={allExercises} />
      )}

      {!splash && screen === 'log' && activeEx && (
        <LogScreen exercise={activeEx} onBack={backFromLog} onComplete={completeExercise} history={history} />
      )}

      {!splash && screen === 'summary' && summary && (
        <SummaryScreen workout={summary.workout} baseHistory={summary.baseHistory} onDone={() => { setSummary(null); setScreen('home'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
