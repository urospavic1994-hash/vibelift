function OnboardingScreen({ onDone }) {
  const [step, setStep]     = useState(0);
  const [fading, setFading] = useState(false);

  const steps = [
    {
      icon: (
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="var(--pink)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 15C3 15 8 6 15 6s12 9 12 9-5 9-12 9S3 15 3 15z"/>
          <circle cx="15" cy="15" r="4" fill="rgba(255,45,120,.2)" stroke="var(--pink)" strokeWidth="1.8"/>
          <circle cx="15" cy="15" r="1.5" fill="var(--pink)" stroke="none"/>
        </svg>
      ),
      title: "Read the Room",
      body: "The bench is taken. The cables are free. VibeLift works with the gym as it is — not as you planned it.",
    },
    {
      icon: (
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="var(--pink)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
          <rect x="3" y="3" width="10" height="10" rx="2.5" fill="rgba(255,45,120,.3)" stroke="var(--pink)"/>
          <rect x="17" y="3" width="10" height="10" rx="2.5" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.2)"/>
          <rect x="3" y="17" width="10" height="10" rx="2.5" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.2)"/>
          <rect x="17" y="17" width="10" height="10" rx="2.5" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.2)"/>
        </svg>
      ),
      title: "Pick What's Open",
      body: "Choose a muscle group based on what equipment is free right now. Start with what you've got.",
    },
    {
      icon: (
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="var(--pink)" strokeWidth="1.8" strokeLinecap="round">
          <line x1="9" y1="15" x2="21" y2="15"/>
          <rect x="4" y="11" width="5" height="8" rx="2" fill="rgba(255,45,120,.2)" stroke="var(--pink)" strokeWidth="1.8"/>
          <rect x="21" y="11" width="5" height="8" rx="2" fill="rgba(255,45,120,.2)" stroke="var(--pink)" strokeWidth="1.8"/>
          <rect x="6" y="13" width="2" height="4" rx="1" fill="var(--pink)" stroke="none"/>
          <rect x="22" y="13" width="2" height="4" rx="1" fill="var(--pink)" stroke="none"/>
        </svg>
      ),
      title: "Log as You Go",
      body: "Free weights or barbell — log every set and rep on the fly. No pre-planning needed.",
    },
    {
      icon: (
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" stroke="var(--pink)" strokeWidth="1.8" strokeLinecap="round">
          <line x1="3" y1="26" x2="27" y2="26" strokeWidth="1.4"/>
          <rect x="4" y="19" width="5" height="7" rx="1.5" fill="rgba(255,45,120,.25)" stroke="var(--pink)"/>
          <rect x="12.5" y="13" width="5" height="13" rx="1.5" fill="rgba(255,45,120,.45)" stroke="var(--pink)"/>
          <rect x="21" y="7" width="5" height="19" rx="1.5" fill="var(--pink)" stroke="var(--pink)"/>
        </svg>
      ),
      title: "Watch Yourself Grow",
      body: "Streaks, personal bests, full history. Every session counts — no matter how the gym looked that day.",
    },
  ];

  function next() {
    if (step < steps.length - 1) { setStep(s => s + 1); }
    else { finish(); }
  }

  function finish() {
    localStorage.setItem('fittrack_toured', 'true');
    setFading(true);
    setTimeout(onDone, 350);
  }

  const s = steps[step];
  const isLast = step === steps.length - 1;

  return (
    <div className={`onboarding-wrap ${fading ? 'fading' : ''}`}>
      <div className="onboarding-bg" onClick={isLast ? undefined : undefined} />
      <div className="onboarding-card">

        <div className="ob-dots">
          {steps.map((_, i) => (
            <div key={i} className={`ob-dot${i === step ? ' active' : i < step ? ' done' : ''}`} />
          ))}
        </div>

        <div className="ob-step-content" key={step}>
          <div className="ob-icon-wrap">{s.icon}</div>
          <div className="ob-step-num">Step {step + 1} of {steps.length}</div>
          <div className="ob-title">{s.title}</div>
          <div className="ob-body">{s.body}</div>
        </div>

        <button className="ob-next-btn" onClick={next}>
          {isLast ? 'Start Training →' : 'Next →'}
        </button>
        {!isLast && (
          <button className="ob-skip-btn" onClick={finish}>Skip tour</button>
        )}

      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   APP ROOT
═══════════════════════════════════════ */
function App() {
  const [history, setHistory]       = useState(() => loadHistory());
  const [current, setCurrent]       = useState(() => loadCurrent());
  const [activeGroup, setActiveGroup] = useState(null);
  const [activeEx, setActiveEx]     = useState(null);
  const [summary, setSummary]       = useState(null);
  const [theme, setTheme]           = useState(() => loadTheme());
  const [profile, setProfile]       = useState(() => loadProfile());
  const [customEx, setCustomEx]     = useState(() => loadCustomEx());
  const [splash, setSplash]         = useState(true);
  const [screen, setScreen]         = useState('home');
  const [breakModal, setBreakModal] = useState(false);
  const [exerciseDoneSheet, setExerciseDoneSheet] = useState(null);
  const [showTour, setShowTour]     = useState(false);

  // Apply theme to body immediately
  useEffect(() => {
    document.body.setAttribute('data-theme', theme);
    saveTheme(theme);
  }, [theme]);

  useEffect(() => { saveCurrent(current); }, [current]);

  function toggleTheme() { setTheme(t => t === 'light' ? 'dark' : 'light'); }

  // Merge built-in + custom exercises — passed to group screens
  const allExercises = useMemo(() => [...DB, ...customEx], [customEx]);
  const weightUnit = (profile && profile.weightUnit) || 'kg';

  function onSplashDone() {
    setSplash(false);
    if (!profile || !profile.setupDone) { setScreen('profile-setup'); return; }
    if (current && current.exercises.length > 0) setBreakModal(true);
  }

  function onProfileSave(p) {
    saveProfile(p);
    setProfile(p);
    setScreen('home');
    if (!localStorage.getItem('fittrack_toured')) setShowTour(true);
  }

  function onSaveProfile(p) { saveProfile(p); setProfile(p); }
  function onSaveCustomEx(ex) { saveCustomEx(ex); setCustomEx(ex); }

  function startWorkout() {
    if (!current) setCurrent({ date: todayISO(), exercises: [] });
    setScreen('group-select');
  }

  function selectGroup(grp) { setActiveGroup(grp); setScreen('group-detail'); }
  function pickExercise(ex) { setActiveEx(ex); setScreen('log'); }

  function completeExercise(ex) {
    setCurrent(prev => ({ ...prev, exercises: [...prev.exercises.filter(e => e.id !== ex.id), ex] }));
    setActiveEx(null);
    setScreen('group-detail');
    setExerciseDoneSheet({ exerciseName: ex.name, group: ex.group });
  }

  function finishWorkout() {
    if (!current || current.exercises.length === 0) return;
    const base = [...history];
    const next = [...history, current];
    setHistory(next); saveHistory(next);
    setSummary({ workout: current, baseHistory: base });
    setCurrent(null);
    setBreakModal(false);
    setExerciseDoneSheet(null);
    setScreen('summary');
  }

  function backFromLog() { setActiveEx(null); setScreen('group-detail'); }
  function backFromGroupDetail() { setScreen('group-select'); }
  function backFromGroupSelect() {
    const hasWork = current && current.exercises.length > 0;
    if (hasWork) { setBreakModal(true); return; }
    setScreen('home');
  }

  const isFirstTime = !profile || !profile.setupDone;
  const completedIds = ((current && current.exercises) ? current.exercises : []).map(e => e.id);

  // Always render splash on top when active
  return (
    <>
      {splash && <SplashScreen isFirstTime={isFirstTime} onContinue={onSplashDone} />}

      {!splash && screen === 'profile-setup' && (
        <ProfileSetupScreen onSave={onProfileSave} />
      )}

      {!splash && screen === 'home' && (
        <HomeScreen onStart={startWorkout} onViewHistory={() => setScreen('history')} onOpenSettings={() => setScreen('settings')} history={history} hasActive={!!current} profile={profile} current={current} />
      )}

      {breakModal && (
        <BreakModal
          onBreak={() => { setBreakModal(false); setScreen('home'); }}
          onDone={() => { finishWorkout(); }}
        />
      )}

      {exerciseDoneSheet && (
        <ExerciseDoneSheet
          exerciseName={exerciseDoneSheet.exerciseName}
          group={exerciseDoneSheet.group}
          onSameGroup={() => { setExerciseDoneSheet(null); setScreen('group-detail'); }}
          onNewGroup={() => { setExerciseDoneSheet(null); setScreen('group-select'); }}
          onFinish={() => { setExerciseDoneSheet(null); finishWorkout(); }}
        />
      )}

      {!splash && screen === 'history' && (
        <HistoryScreen onBack={() => setScreen('home')} history={history} weightUnit={weightUnit} />
      )}

      {!splash && screen === 'settings' && (
        <SettingsScreen onBack={() => setScreen('home')} profile={profile} onSaveProfile={onSaveProfile} theme={theme} onToggleTheme={toggleTheme} customEx={customEx} onSaveCustomEx={onSaveCustomEx} onShowTour={() => setShowTour(true)} />
      )}

      {showTour && <OnboardingScreen onDone={() => setShowTour(false)} />}

      {!splash && screen === 'group-select' && (
        <GroupSelectScreen onBack={backFromGroupSelect} onSelectGroup={selectGroup} onFinish={finishWorkout} completedIds={completedIds} allExercises={allExercises} />
      )}

      {!splash && screen === 'group-detail' && activeGroup && (
        <GroupDetailScreen group={activeGroup} onBack={backFromGroupDetail} onPick={pickExercise} onFinish={finishWorkout} completedIds={completedIds} history={history} allExercises={allExercises} />
      )}

      {!splash && screen === 'log' && activeEx && (
        <LogScreen exercise={activeEx} onBack={backFromLog} onComplete={completeExercise} history={history} weightUnit={weightUnit} />
      )}

      {!splash && screen === 'summary' && summary && (
        <SummaryScreen workout={summary.workout} baseHistory={summary.baseHistory} onDone={() => { setSummary(null); setScreen('home'); }} weightUnit={weightUnit} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
